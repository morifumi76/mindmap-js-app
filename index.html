                    selectedNodeIds.add(el.dataset.id);
                }
            });
            if (selectedNodeIds.size > 0) {
                lastSelectedNodeId = selectedNodeIds.values().next().value;
                updateSelectionDisplay();
                lassoState.didSelect = true;
                showToast(selectedNodeIds.size + '個のノードを選択しました');
            }
        }

        // ========================================
        // Rendering
        // ========================================

        function render() {
            var container = document.getElementById('canvasInner');
            var svg = document.getElementById('linesSvg');
            container.querySelectorAll('.node').forEach(function(n) { n.remove(); });
            svg.innerHTML = '';

            // Pass 1: Measure actual node dimensions by creating temporary elements
            var nodeDims = measureNodeDimensions(mindMapData.root, container);

            // Pass 2: Layout with actual dimensions
            var positions = {};
            layoutNodes(mindMapData.root, positions, 0, 0, 1, nodeDims);

            // Pass 3: Render nodes and lines
            renderNodes(mindMapData.root, container, positions);
            renderLines(mindMapData.root, svg, positions);
            updateSelectionDisplay();
            updateView();
            // Auto-save to localStorage after every render (post-mutation state)
            saveToLocalStorage();
            // Update sidebar tree in real-time
            renderSidebarTree();
        }

        // Measure actual rendered width AND height of each node's text
        function measureNodeDimensions(rootNode, container) {
            var dims = {};
            // Create a measurer that exactly mirrors the .node DOM structure
            var measurer = document.createElement('div');
            measurer.className = 'node';
            measurer.style.position = 'absolute';
            measurer.style.visibility = 'hidden';
            measurer.style.pointerEvents = 'none';
            // Don't set transform since we just need dimensions
            var measurerText = document.createElement('span');
            measurerText.className = 'node-text';
            measurer.appendChild(measurerText);
            container.appendChild(measurer);

            function measure(node) {
                // Render \n as <br> for accurate measurement
                if (node.text.indexOf('\n') >= 0) {
                    measurerText.innerHTML = node.text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
                } else {
                    measurerText.textContent = node.text;
                }
                // Root nodes have larger font
                if (node.id === 'root') {
                    measurer.classList.add('root');
                } else {
                    measurer.classList.remove('root');
                }
                dims[node.id] = { width: measurer.offsetWidth, height: measurer.offsetHeight };
                for (var i = 0; i < node.children.length; i++) {
                    measure(node.children[i]);
                }
            }
            measure(rootNode);
            container.removeChild(measurer);
            return dims;
        }

        function layoutNodes(node, positions, x, y, level, nodeDims) {
            if (x === undefined) x = 0;
            if (y === undefined) y = 0;
            if (level === undefined) level = 1;
            var dims = (nodeDims && nodeDims[node.id]) ? nodeDims[node.id] : { width: 150, height: 40 };
            var nodeWidth = dims.width;
            var nodeHeight = dims.height;
            var hGap = 40, vGap = 16;
            var totalH = 0, childHeights = [];
            for (var i = 0; i < node.children.length; i++) {
                var ch = calcSubtreeHeight(node.children[i], vGap, nodeDims);
                childHeights.push(ch);
                totalH += ch;
            }
            if (node.children.length > 1) totalH += (node.children.length - 1) * vGap;
            positions[node.id] = { x: x, y: y, width: nodeWidth, height: nodeHeight, level: level };
            var childX = x + nodeWidth + hGap;
            var childY = y - totalH / 2;
            for (var i = 0; i < node.children.length; i++) {
                var ch = childHeights[i];
                var centerY = childY + ch / 2;
                layoutNodes(node.children[i], positions, childX, centerY, level + 1, nodeDims);
                childY += ch + vGap;
            }
            return positions;
        }

        function calcSubtreeHeight(node, gap, nodeDims) {
            var dims = (nodeDims && nodeDims[node.id]) ? nodeDims[node.id] : { width: 150, height: 40 };
            var nodeHeight = dims.height;
            if (node.children.length === 0) return nodeHeight;
            var total = 0;
            for (var i = 0; i < node.children.length; i++) {
                total += calcSubtreeHeight(node.children[i], gap, nodeDims);
            }
            total += (node.children.length - 1) * gap;
            return Math.max(nodeHeight, total);
        }

        function renderNodes(node, container, positions) {
            var pos = positions[node.id];
            if (!pos) return;
            var el = document.createElement('div');
            el.className = 'node' + (node.id === 'root' ? ' root' : '');
            el.dataset.id = node.id;
            el.style.left = pos.x + 'px';
            el.style.top = pos.y + 'px';
            el.style.width = pos.width + 'px';
            el.style.transform = 'translateY(-50%)';
            var textEl = document.createElement('span');
            textEl.className = 'node-text';
            // Render \n as <br> for display
            if (node.text.indexOf('\n') >= 0) {
                textEl.innerHTML = node.text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
            } else {
                textEl.textContent = node.text;
            }
            el.appendChild(textEl);

            // Use a closure to capture node reference
            (function(nodeData, nodeElement) {

                // Click handler: default to editing mode
                nodeElement.addEventListener('click', function(e) {
                    e.stopPropagation();

                    // If a drag just occurred, suppress click
                    if (nodeDragState.didDrag) {
                        nodeDragState.didDrag = false;
                        return;
                    }

                    var isMac = /Mac/.test(navigator.platform);
                    var cmdKey = isMac ? e.metaKey : e.ctrlKey;

                    if (cmdKey && e.shiftKey) {
                        finishEditing();
                        var allNodes = getAllNodesInOrder();
                        var si = -1, ei = -1;
                        for (var i = 0; i < allNodes.length; i++) {
                            if (allNodes[i].id === lastSelectedNodeId) si = i;
                            if (allNodes[i].id === nodeData.id) ei = i;
                        }
                        if (si !== -1 && ei !== -1) {
                            var mn = Math.min(si, ei), mx = Math.max(si, ei);
                            for (var i = mn; i <= mx; i++) selectedNodeIds.add(allNodes[i].id);
                            lastSelectedNodeId = nodeData.id;
                            updateSelectionDisplay();
                        }
                    } else if (e.shiftKey) {
                        finishEditing();
                        rangeSelectNode(nodeData.id);
                    } else if (cmdKey) {
                        finishEditing();
                        toggleSelectNode(nodeData.id);
                    } else {
                        // Normal click -> enter edit mode directly
                        if (editingNodeId === nodeData.id) return;
                        finishEditing();
                        selectNode(nodeData.id);
                        startEditing(nodeData.id);
                    }
                });

                // Double-click: enter edit mode (for when already selected but not editing)
                nodeElement.addEventListener('dblclick', function(e) {
                    e.stopPropagation();
                    startEditing(nodeData.id);
                });

                // Mousedown: start potential drag (only left button, no modifiers, not editing)
                nodeElement.addEventListener('mousedown', function(e) {
                    if (e.button !== 0) return;
                    if (editingNodeId) return;
                    if (e.metaKey || e.ctrlKey || e.shiftKey) return;
                    e.preventDefault();
                    e.stopPropagation();
                    startNodeDrag(nodeData.id, e.clientX, e.clientY, nodeElement);
                });

            })(node, el);

            container.appendChild(el);
            for (var i = 0; i < node.children.length; i++) {
                renderNodes(node.children[i], container, positions);
            }
        }

        function renderLines(node, svg, positions) {
            var pp = positions[node.id];
            if (!pp) return;
            var off = 5000;
            for (var i = 0; i < node.children.length; i++) {
                var child = node.children[i];
                var cp = positions[child.id];
                if (!cp) continue;
                var sx = pp.x + pp.width + off, sy = pp.y + off;
                var ex = cp.x + off, ey = cp.y + off;
                var mx = sx + (ex - sx) / 2;
                var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', 'M ' + sx + ' ' + sy + ' C ' + mx + ' ' + sy + ', ' + mx + ' ' + ey + ', ' + ex + ' ' + ey);
                path.setAttribute('class', 'connection-line');
                svg.appendChild(path);
                renderLines(child, svg, positions);
            }
        }

        // ========================================
        // View Controls
        // ========================================

        function updateView() {
            var inner = document.getElementById('canvasInner');
            inner.style.transform = 'translate(' + viewState.panX + 'px, ' + viewState.panY + 'px) scale(' + viewState.zoom + ')';
        }

        function resetView() {
            var container = document.getElementById('canvasContainer');
            viewState.zoom = 1;
            viewState.panX = container.clientWidth / 2 - 75;
            viewState.panY = container.clientHeight / 2;
            updateView();
        }

        // ========================================
        // Keyboard Handler
        // ========================================

        function handleKeyDown(e) {
            var isMac = /Mac/.test(navigator.platform);
            var cmdKey = isMac ? e.metaKey : e.ctrlKey;

            // If focus is in a rename input field in My Maps sidebar, do NOT handle shortcuts
            var activeEl = document.activeElement;
            if (activeEl && (activeEl.classList.contains('map-item-rename-input') ||
                (activeEl.classList.contains('map-item-name') && activeEl.contentEditable === 'true'))) {
                // Allow default behavior for the rename input
                // Only handle Enter/Escape which are handled by the input's own listener
                return;
            }

            // While editing
            if (editingNodeId) {
                // IME入力中（ローマ字→日本語変換）のキーは無視する
                if (e.isComposing || e.keyCode === 229) return;

                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    finishEditing();
                } else if (e.key === 'Enter' && e.shiftKey) {
                    // Shift+Enter: insert line break
                    e.preventDefault();
                    var sel = window.getSelection();
                    if (sel.rangeCount) {
                        var range = sel.getRangeAt(0);
                        range.deleteContents();
                        var br = document.createElement('br');
                        range.insertNode(br);
                        // Insert a zero-width space after <br> so cursor has a text node to land in
                        var textNode = document.createTextNode('\u200B');
                        br.parentNode.insertBefore(textNode, br.nextSibling);
                        // Move cursor into the text node after <br>
                        range = document.createRange();
                        range.setStart(textNode, 1);
                        range.setEnd(textNode, 1);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    finishEditing();
                } else if (e.key === 'Tab') {
                    e.preventDefault();
                    finishEditing();
                    if (e.shiftKey) { goToParent(); }
                    else { var cid = getSelectedNodeId(); if (cid) addChildNode(cid); }
                } else if (cmdKey && (e.key === 'z' || e.key === 'Z')) {
                    e.preventDefault(); finishEditing(); undo();
                } else if (cmdKey && (e.key === 'y' || e.key === 'Y')) {
                    e.preventDefault(); finishEditing(); redo();
                }
                return;
            }

            var currentId = getSelectedNodeId();

            switch (e.key) {
                case 'Enter':
                    e.preventDefault();
                    if (currentId) addSiblingNode(currentId);
                    break;
                case 'Tab':
                    e.preventDefault();
                    if (e.shiftKey) goToParent();
                    else if (currentId) addChildNode(currentId);
                    break;
                case 'Delete':
                case 'Backspace':
                    e.preventDefault();
                    if (selectedNodeIds.size > 1) deleteSelectedNodes();
                    else if (currentId && currentId !== 'root') deleteNode(currentId);
                    break;
                case 'F2':
                    e.preventDefault();
                    if (currentId) startEditing(currentId);
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    if (cmdKey) { if (currentId) moveNodeUp(currentId); }
                    else if (e.shiftKey) { shiftNavigateUp(); }
                    else navigateUp();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (cmdKey) { if (currentId) moveNodeDown(currentId); }
                    else if (e.shiftKey) { shiftNavigateDown(); }
                    else navigateDown();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (cmdKey) { if (currentId) promoteNode(currentId); }
                    else navigateLeft();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (cmdKey) { if (currentId) demoteNode(currentId); }
                    else navigateRight();
                    break;
                case 'z': case 'Z':
                    if (cmdKey) { e.preventDefault(); undo(); }
                    break;
                case 'y': case 'Y':
                    if (cmdKey) { e.preventDefault(); redo(); }
                    break;
                case 'a': case 'A':
                    if (cmdKey) { e.preventDefault(); selectAll(); }
                    break;
                case 'c': case 'C':
                    if (cmdKey) { e.preventDefault(); copySelectedNodes(); }
                    break;
                case 'v': case 'V':
                    if (cmdKey) { e.preventDefault(); pasteNode(); }
                    break;
                case 'x': case 'X':
                    if (cmdKey) { e.preventDefault(); cutSelectedNodes(); }
                    break;
                case 'Escape':
                    clearSelection();
                    break;
            }
        }

        // ========================================
        // Canvas Interaction: Pan, Zoom, Lasso
        // ========================================

        function initCanvasInteraction() {
            var canvas = document.getElementById('canvas');

            // --- Mousedown ---
            canvas.addEventListener('mousedown', function(e) {
                if (nodeDragState.isDragging) return;

                var isBackground = (e.target === canvas ||
                    e.target.id === 'canvasInner' ||
                    e.target.tagName === 'svg' ||
                    e.target.classList.contains('lines-svg'));

                if (!isBackground) return;

                // Right-click or middle-click: pan
                if (e.button === 2 || e.button === 1) {
                    e.preventDefault();
                    viewState.isPanning = true;
                    viewState.startX = e.clientX - viewState.panX;
                    viewState.startY = e.clientY - viewState.panY;
                    canvas.classList.add('panning');
                    return;
                }

                // Left-click on background: start lasso
                if (e.button === 0) {
                    finishEditing();
                    startLasso(e.clientX, e.clientY);
                }
            });

            // --- Mousemove ---
            canvas.addEventListener('mousemove', function(e) {
                if (nodeDragState.isDragging) return;
                if (viewState.isPanning) {
                    viewState.panX = e.clientX - viewState.startX;
                    viewState.panY = e.clientY - viewState.startY;
                    updateView();
                    return;
                }
                if (lassoState.active) {
                    updateLasso(e.clientX, e.clientY);
                }
            });

            // --- Mouseup ---
            canvas.addEventListener('mouseup', function(e) {
                if (viewState.isPanning) {
                    viewState.isPanning = false;
                    canvas.classList.remove('panning');
                    return;
                }
                if (lassoState.active) {
                    endLasso();
                }
            });

            // --- Click on background: clear selection ---
            canvas.addEventListener('click', function(e) {
                var isBackground = (e.target === canvas ||
                    e.target.id === 'canvasInner' ||
                    e.target.tagName === 'svg' ||
                    e.target.classList.contains('lines-svg'));

                if (!isBackground) return;

                // Don't clear if lasso just selected nodes
                if (lassoState.didSelect) {
                    lassoState.didSelect = false;
                    return;
                }
                finishEditing();
                clearSelection();
            });

            // --- Mouseleave ---
            canvas.addEventListener('mouseleave', function() {
                if (viewState.isPanning) {
                    viewState.isPanning = false;
                    canvas.classList.remove('panning');
                }
                if (lassoState.active) endLasso();
                if (nodeDragState.isDragging) endNodeDrag();
            });

            // --- Context menu prevention ---
            canvas.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });

            // --- Wheel: zoom (mouse scroll wheel) / pan (trackpad 2-finger) ---
            canvas.addEventListener('wheel', function(e) {
                e.preventDefault();
                var container = document.getElementById('canvasContainer');
                var rect = container.getBoundingClientRect();
                var mouseX = e.clientX - rect.left;
                var mouseY = e.clientY - rect.top;

                // ctrlKey is set by browser during trackpad pinch gesture
                if (e.ctrlKey) {
                    // Pinch zoom
                    var zoomDelta = -e.deltaY * 0.01;
                    applyZoom(mouseX, mouseY, zoomDelta);
                    return;
                }

                // Trackpad 2-finger scroll → pan
                // Mouse scroll wheel → zoom (deltaMode = 1 for line-based, or large deltaY)
                if (e.deltaMode === 0 && (Math.abs(e.deltaX) > 1 || Math.abs(e.deltaY) < 80)) {
                    // Likely trackpad: pan
                    viewState.panX -= e.deltaX;
                    viewState.panY -= e.deltaY;
                    updateView();
                } else {
                    // Mouse scroll wheel: zoom
                    var zoomDelta = e.deltaY > 0 ? -0.1 : 0.1;
                    applyZoom(mouseX, mouseY, zoomDelta);
                }
            }, { passive: false });

            // --- Touch events for pinch-zoom ---
            var lastTouchDist = 0;
            var lastTouchCenter = { x: 0, y: 0 };

            canvas.addEventListener('touchstart', function(e) {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    var t1 = e.touches[0], t2 = e.touches[1];
                    lastTouchDist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                    lastTouchCenter = { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', function(e) {
                if (e.touches.length === 2) {
                    e.preventDefault();
                    var t1 = e.touches[0], t2 = e.touches[1];
                    var dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
                    var center = { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
                    var scale = dist / lastTouchDist;
                    var oldZoom = viewState.zoom;
                    var newZoom = Math.max(0.2, Math.min(3, oldZoom * scale));
                    var actualScale = newZoom / oldZoom;
                    viewState.panX = center.x - actualScale * (center.x - viewState.panX);
                    viewState.panY = center.y - actualScale * (center.y - viewState.panY);
                    viewState.zoom = newZoom;
                    viewState.panX += center.x - lastTouchCenter.x;
                    viewState.panY += center.y - lastTouchCenter.y;
                    lastTouchDist = dist;
                    lastTouchCenter = center;
                    updateView();
                }
            }, { passive: false });
        }

        function applyZoom(mouseX, mouseY, zoomDelta) {
            var oldZoom = viewState.zoom;
            var newZoom = Math.max(0.2, Math.min(3, oldZoom + zoomDelta));
            var scale = newZoom / oldZoom;
            viewState.panX = mouseX - scale * (mouseX - viewState.panX);
            viewState.panY = mouseY - scale * (mouseY - viewState.panY);
            viewState.zoom = newZoom;
            updateView();
        }

        function renderSidebarTree() {
            var tree = document.getElementById('sidebarTree');

            var useBorder = (border === 'border');
            var lines = [];
            generatePreviewLines(mindMapData.root, 0, [], format, useBorder, lines);

            var displayLines = [];
            for (var i = 0; i < lines.length; i++) {
                if (!lines[i].isSep) displayLines.push(lines[i]);
            }

            var html = '<pre class="sidebar-preview">';
            for (var i = 0; i < displayLines.length; i++) {
                var line = displayLines[i];
                var isSelected = selectedNodeIds.has(line.nodeId);
                var cls = 'sidebar-preview-line' + (isSelected ? ' active' : '');
                var escaped = line.text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                html += '<span class="' + cls + '" data-sid="' + line.nodeId + '">' + escaped + '</span>';
            }
            html += '</pre>';
            tree.innerHTML = html;

            tree.querySelectorAll('.sidebar-preview-line').forEach(function(el) {

            }

        function generatePreviewLines(node, level, parentContinues, format, useBorder, lines) {
            var iconLevel = Math.min(level + 1, 4);
            var icons = levelIcons[format];
            var icon = icons ? (icons[iconLevel] + ' ') : '';

            var lineText = '';
            if (level === 0) {
                lineText = icon + node.text;
            } else {
                var prefix = '';
                for (var i = 0; i < level - 1; i++) {
                    if (useBorder) {
                        prefix += parentContinues[i] ? '│  ' : '   ';
                    } else {
                        prefix += '  ';
                    }
                }
                var isLast = (parentContinues[level - 1] === false);
                var connector;
                if (useBorder) {
                    connector = isLast ? '└─ ' : '├─ ';
                } else {
                    connector = '  ';
                }
                lineText = prefix + connector + icon + node.text;
            }
            lineText = lineText.replace(/\n/g, ' ');
            lines.push({ text: lineText, nodeId: node.id });

            for (var i = 0; i < node.children.length; i++) {
                var isLastChild = (i === node.children.length - 1);
                var newContinues = parentContinues.slice();
                newContinues.push(!isLastChild);
                generatePreviewLines(node.children[i], level + 1, newContinues, format, useBorder, lines);
            }

            if (useBorder && level > 0 && node.children.length > 0) {
                var amILast = (parentContinues[level - 1] === false);
                if (!amILast) {
                    var sep = '';
                    for (var i = 0; i < level - 1; i++) {
                        sep += parentContinues[i] ? '│  ' : '   ';
                    }
                    sep += '│';
                    lines.push({ text: sep, nodeId: '', isSep: true });
                }
            }
        }

            var sidebarW = sidebar ? sidebar.offsetWidth : 0;
            var rect = nodeEl.getBoundingClientRect();
            var cRect = container.getBoundingClientRect();
            var availableW = cRect.width - sidebarW;
            var targetX = cRect.left + availableW / 2;
            var targetY = cRect.top + cRect.height / 2;
            var dx = targetX - (rect.left + rect.width / 2);
            var dy = targetY - (rect.top + rect.height / 2);
            viewState.panX += dx;
            viewState.panY += dy;
            updateView();
            renderSidebarTree();
        }

        // ---- Render Map List (Folder → Page Tree) ----
        function renderMapList() {
            var list = document.getElementById('mapList');
            if (!list) return;
            var metaList = getMetaList();
            metaList = ensureDefaultFolder(metaList);
            saveMetaList(metaList);
            var sortMode = getSortMode();
            var collapseState = getCollapseState();

            // Separate folders and pages
            var folders = metaList.filter(function(m) { return m.type === 'folder'; });
            var pages = metaList.filter(function(m) { return m.type === 'page'; });

            // Build page map: folderId -> [pages]
            var pageMap = {};
            for (var i = 0; i < pages.length; i++) {
                var fid = pages[i].folderId || getDefaultFolderId(metaList);
                if (!pageMap[fid]) pageMap[fid] = [];
                pageMap[fid].push(pages[i]);
            }

            // Sort folders: 未分類 always last, others by order or alpha
            var defaultFolders = folders.filter(function(f) { return f.isDefault; });
            var regularFolders = folders.filter(function(f) { return !f.isDefault; });

            if (sortMode === 'alpha') {
                regularFolders.sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
                for (var fid in pageMap) {
                    pageMap[fid].sort(function(a, b) { return (a.name || '').localeCompare(b.name || ''); });
                }
            } else {
                regularFolders.sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
                for (var fid in pageMap) {
                    pageMap[fid].sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
                }
            }

            // Final folder order: regular folders + 未分類 at bottom
            var orderedFolders = regularFolders.concat(defaultFolders);

            list.innerHTML = '';
            var isDndEnabled = (sortMode !== 'alpha');

            for (var fi = 0; fi < orderedFolders.length; fi++) {
                var folder = orderedFolders[fi];
                var folderPages = pageMap[folder.id] || [];
                var hasPages = folderPages.length > 0;
                var isCollapsed = collapseState[folder.id] === true;

                var folderEl = createFolderElement(folder, hasPages, isCollapsed, isDndEnabled);
                list.appendChild(folderEl);

                // Render pages if not collapsed
                if (!isCollapsed) {
                    for (var pi = 0; pi < folderPages.length; pi++) {
                        var page = folderPages[pi];
                        var isPageActive = (page.id === currentMapId);
                        var pageEl = createPageElement(page, isPageActive, isDndEnabled, folder);
                        list.appendChild(pageEl);
                    }
                }
            }
        }

        function createFolderElement(folder, hasPages, isCollapsed, isDndEnabled) {
            var item = document.createElement('div');
            item.className = 'map-item folder-item' + (folder.isDefault ? ' default-folder' : '');
            item.dataset.mapId = folder.id;
            item.dataset.itemType = 'folder';
            item.dataset.isDefault = folder.isDefault ? '1' : '';

            if (isDndEnabled && !folder.isDefault) {
                item.draggable = true;
            }

            // Expand/collapse toggle
            var toggle = document.createElement('button');
            toggle.className = 'map-item-toggle';
            if (hasPages) {
                toggle.textContent = isCollapsed ? '►' : '▼';
                toggle.title = isCollapsed ? '展開' : '折りたたむ';
            } else {
                toggle.textContent = '►';
                toggle.style.visibility = 'hidden';
            }
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                if (!hasPages) return;
                var cs = getCollapseState();
                cs[folder.id] = !isCollapsed;
                setCollapseState(cs);
                renderMapList();
            });
            item.appendChild(toggle);

            var name = document.createElement('span');
            name.className = 'map-item-name';
            name.textContent = folder.name;
            name.title = folder.name;

            var menuBtn = document.createElement('button');
            menuBtn.className = 'map-item-menu-btn';
            menuBtn.textContent = '⋯';
            menuBtn.title = 'メニュー';

            item.appendChild(name);
            item.appendChild(menuBtn);

            (function(folderId, folderMeta, itemEl, nameEl, menuBtnEl) {
                // Click on folder: toggle expand/collapse
                itemEl.addEventListener('click', function(e) {
                    if (e.target === menuBtnEl || e.target.classList.contains('map-item-menu-btn')) return;
                    if (e.target.contentEditable === 'true') return;
                    if (e.target.tagName === 'INPUT') return;
                    if (e.target.classList.contains('map-item-toggle')) return;
                    // Toggle expand/collapse on folder click
                    var cs = getCollapseState();
                    cs[folderId] = !cs[folderId];
                    setCollapseState(cs);
                    renderMapList();
                });

                // Right-click on folder shows folder context menu
                itemEl.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    showFolderContextMenu(folderId, menuBtnEl);
                });

                menuBtnEl.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showFolderContextMenu(folderId, menuBtnEl);
                });

                // Double-click to rename (not for 未分類)
                if (!folderMeta.isDefault) {
                    nameEl.addEventListener('dblclick', function(e) {
                        e.stopPropagation();
                        e.preventDefault();
                        startInlineRename(folderId);
                    });
                }

                // Drag & Drop for folders
                if (isDndEnabled && !folderMeta.isDefault) {
                    itemEl.addEventListener('dragstart', function(e) {
                        e.dataTransfer.setData('text/plain', String(folderId));
                        e.dataTransfer.setData('item-type', 'folder');
                        e.dataTransfer.effectAllowed = 'move';
                        itemEl.classList.add('map-dragging');
                        mapDragState.draggingId = folderId;
                        mapDragState.draggingType = 'folder';
                    });
                    itemEl.addEventListener('dragend', function(e) {
                        itemEl.classList.remove('map-dragging');
                        clearMapDragIndicators();
                        mapDragState.draggingId = null;
                        mapDragState.draggingType = null;
                    });
                }

                // Drop target for folders (accept pages dropped onto folder, or folder reorder)
                itemEl.addEventListener('dragover', function(e) {
                    if (!mapDragState.draggingId) return;
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    clearMapDragIndicators();
                    if (mapDragState.draggingId === folderId) return;

                    var rect = itemEl.getBoundingClientRect();
                    var relY = e.clientY - rect.top;
                    var h = rect.height;

                    if (mapDragState.draggingType === 'folder') {
                        // Folder reordering: above or below only (no nesting), but NOT on 未分類
                        if (folderMeta.isDefault) return;
                        if (relY < h * 0.5) {
                            itemEl.classList.add('drag-over-above');
                            mapDragState.dropTarget = { id: folderId, position: 'above', type: 'folder' };
                        } else {
                            itemEl.classList.add('drag-over-below');
                            mapDragState.dropTarget = { id: folderId, position: 'below', type: 'folder' };
                        }
                    } else {
                        // Page dropped onto folder: move page into this folder
                        itemEl.classList.add('drag-over-into');
                        mapDragState.dropTarget = { id: folderId, position: 'into', type: 'folder' };
                    }
                });
                itemEl.addEventListener('dragleave', function(e) {
                    itemEl.classList.remove('drag-over-above', 'drag-over-below', 'drag-over-into');
                });
                itemEl.addEventListener('drop', function(e) {
                    e.preventDefault();
                    clearMapDragIndicators();
                    if (!mapDragState.draggingId || !mapDragState.dropTarget) return;
                    handleMapDrop(mapDragState.draggingId, mapDragState.dropTarget.id, mapDragState.dropTarget.position, mapDragState.draggingType);
                    mapDragState.draggingId = null;
                    mapDragState.dropTarget = null;
                    mapDragState.draggingType = null;
                });
            })(folder.id, folder, item, name, menuBtn);

            return item;
        }

        function createPageElement(page, isActive, isDndEnabled, parentFolder) {

                // Drag & Drop for pages
                if (isDndEnabled) {
                    itemEl.addEventListener('dragstart', function(e) {
                        e.dataTransfer.setData('text/plain', String(pageId));
                        e.dataTransfer.setData('item-type', 'page');
                        e.dataTransfer.effectAllowed = 'move';
                        itemEl.classList.add('map-dragging');
                        mapDragState.draggingId = pageId;

                    });
                    itemEl.addEventListener('dragend', function(e) {
                        itemEl.classList.remove('map-dragging');
                        clearMapDragIndicators();
                        mapDragState.draggingId = null;
                        mapDragState.draggingType = null;
                    });
                    itemEl.addEventListener('dragover', function(e) {
                        if (!mapDragState.draggingId) return;
                        e.preventDefault();
                        e.dataTransfer.dropEffect = 'move';
                        clearMapDragIndicators();
                        if (mapDragState.draggingId === pageId) return;

                        // Only pages can be placed above/below other pages
                        if (mapDragState.draggingType !== 'page') return;

                        var rect = itemEl.getBoundingClientRect();
                        var relY = e.clientY - rect.top;
                        var h = rect.height;

                        if (relY < h * 0.5) {
                            itemEl.classList.add('drag-over-above');
                            mapDragState.dropTarget = { id: pageId, position: 'above', type: 'page' };
                        } else {
                            itemEl.classList.add('drag-over-below');
                            mapDragState.dropTarget = { id: pageId, position: 'below', type: 'page' };
                        }
                    });
                    itemEl.addEventListener('dragleave', function(e) {
                        itemEl.classList.remove('drag-over-above', 'drag-over-below');
                    });
                    itemEl.addEventListener('drop', function(e) {
                        e.preventDefault();
                        clearMapDragIndicators();
                        if (!mapDragState.draggingId || !mapDragState.dropTarget) return;
                        handleMapDrop(mapDragState.draggingId, mapDragState.dropTarget.id, mapDragState.dropTarget.position, mapDragState.draggingType);
                        mapDragState.draggingId = null;
                        mapDragState.dropTarget = null;
                        mapDragState.draggingType = null;
                    });
                }
            })(page.id, page, item, name, menuBtn);

            return item;
        }

        // ---- Map Drag & Drop State ----
        var mapDragState = {
            draggingId: null,
            draggingType: null, // 'folder' or 'page'
            dropTarget: null
        };

        function clearMapDragIndicators() {
            document.querySelectorAll('.map-item').forEach(function(el) {
                el.classList.remove('drag-over-above', 'drag-over-below', 'drag-over-into');
            });
        }

        function handleMapDrop(dragId, targetId, position, dragType) {
            if (dragId === targetId) return;
            var metaList = getMetaList();
            var dragMeta = null, targetMeta = null;
            for (var i = 0; i < metaList.length; i++) {
                if (metaList[i].id === dragId) dragMeta = metaList[i];
                if (metaList[i].id === targetId) targetMeta = metaList[i];
            }
            if (!dragMeta || !targetMeta) return;

            if (dragType === 'folder') {
                // Folder reordering among folders only
                if (targetMeta.type !== 'folder' || targetMeta.isDefault) return;
                var allFolders = metaList.filter(function(m) { return m.type === 'folder' && !m.isDefault && m.id !== dragId; });
                allFolders.sort(function(a, b) { return (a.order || 0) - (b.order || 0); });
                var targetIdx = -1;
                for (var i = 0; i < allFolders.length; i++) {
                    if (allFolders[i].id === targetId) { targetIdx = i; break; }
                }
                if (targetIdx === -1) return;
                if (position === 'below') targetIdx++;
                allFolders.splice(targetIdx, 0, dragMeta);
                for (var i = 0; i < allFolders.length; i++) {
                    allFolders[i].order = i;
                }
            } else if (dragType === 'page') {
                if (position === 'into' && targetMeta.type === 'folder') {
                    // Move page into folder
                    dragMeta.folderId = targetId;
                    var pagesInFolder = metaList.filter(function(m) { return m.type === 'page' && m.folderId === targetId; });
                    dragMeta.order = pagesInFolder.length > 0 ? Math.max.apply(null, pagesInFolder.map(function(m) { return m.order || 0; })) + 1 : 0;
                    // Expand the target folder
                    var cs = getCollapseState();
                    cs[targetId] = false;
                    setCollapseState(cs);
                } else if (targetMeta.type === 'page') {
                    // Reorder page among siblings in same folder, or move to different folder
                    var targetFolderId = targetMeta.folderId;
                    dragMeta.folderId = targetFolderId;

                    var siblings = metaList.filter(function(m) {
                        return m.type === 'page' && m.folderId === targetFolderId && m.id !== dragId;
                    });
                    siblings.sort(function(a, b) { return (a.order || 0) - (b.order || 0); });

                    var targetIdx = -1;
                    for (var i = 0; i < siblings.length; i++) {
                        if (siblings[i].id === targetId) { targetIdx = i; break; }
                    }
                    if (targetIdx === -1) targetIdx = siblings.length - 1;
                    if (position === 'below') targetIdx++;
                    siblings.splice(targetIdx, 0, dragMeta);
                    for (var i = 0; i < siblings.length; i++) {
                        siblings[i].order = i;
                    }
                }
            }

            saveMetaList(metaList);
            renderMapList();
        }

        // ---- Context Menus ----

        // ---- CRUD: Pages ----
        function createNewMap() {
            // Creates a new page in the currently selected folder (or 未分類)
            saveToLocalStorage();

            var metaList = getMetaList();
            var defFolderId = getDefaultFolderId(metaList);

            // Determine target folder: use folder of current active page, or 未分類
            var targetFolderId = defFolderId;
            if (currentMapId) {
                var currentMeta = findMetaById(currentMapId);
                if (currentMeta && currentMeta.type === 'page' && currentMeta.folderId) {
                    targetFolderId = currentMeta.folderId;
                }
            }

            var newId = getNextMapId();
            var now = nowISO();
            var defaultData = { root: { id: 'root', text: '中心テーマ', children: [] } };

            // Get max order among pages in target folder
            var maxOrder = 0;
            for (var i = 0; i < metaList.length; i++) {
                if (metaList[i].type === 'page' && metaList[i].folderId === targetFolderId && (metaList[i].order || 0) >= maxOrder) {
                    maxOrder = (metaList[i].order || 0) + 1;
                }
            }

            var meta = { id: newId, name: '無題のマップ', type: 'page', folderId: targetFolderId, order: maxOrder, createdAt: now, updatedAt: now };
            metaList.push(meta);
            saveMetaList(metaList);
            try { localStorage.setItem(getMapDataKey(newId), JSON.stringify(defaultData)); } catch(e) {}

            // Expand the target folder
            var cs = getCollapseState();
            cs[targetFolderId] = false;
            setCollapseState(cs);

            switchToMap(newId);
            showToast('新しいマップを作成しました');
        }

        function deleteFolder(folderId) {
            var metaList = getMetaList();

            var pagesInFolder = metaList.filter(function(m) { return m.type === 'page' && m.folderId === folderId; });

            var defFolderId = getDefaultFolderId(metaList);

        function switchToMap(mapId) {

        function duplicateMap(mapId) {

            var srcData = loadMapData(mapId);
            if (!srcData) return;

            var newId = getNextMapId();
            var now = nowISO();

            // Get max order among pages in same folder
            var metaList = getMetaList();
            var folderId = srcMeta.folderId;
            var maxOrder = 0;
            for (var i = 0; i < metaList.length; i++) {
                if (metaList[i].type === 'page' && metaList[i].folderId === folderId && (metaList[i].order || 0) >= maxOrder) {
                    maxOrder = (metaList[i].order || 0) + 1;
                }
            }

            var newMeta = {
                id: newId,
                name: srcMeta.name + ' のコピー',
                type: 'page',
                folderId: folderId,
                order: maxOrder,
                createdAt: now,
                updatedAt: now
            };

        function deleteMap(mapId) {
            var metaList = getMetaList();
            var pages = metaList.filter(function(m) { return m.type === 'page'; });
            if (pages.length <= 1) {
                showToast('⚠️ 最後のマップは削除できません');
                return;
            }
            if (!confirm('このマップを削除しますか？')) return;

            // Remove from meta
            var newMeta = metaList.filter(function(m) { return m.id !== mapId; });

            saveMetaList(newMeta);
            try { localStorage.removeItem(getMapDataKey(mapId)); } catch(e) {}

            if (mapId === currentMapId) {
                // Switch to first available page
                var remainingPages = newMeta.filter(function(m) { return m.type === 'page'; });
                remainingPages.sort(function(a, b) { return (b.updatedAt || '').localeCompare(a.updatedAt || ''); });
                if (remainingPages.length > 0) {
                    switchToMap(remainingPages[0].id);
                }
            } else {
                renderMapList();
            }
            showToast('🗑 マップを削除しました');
        }

        function startInlineRename(mapId) {
            var item = document.querySelector('.map-item[data-map-id="' + mapId + '"]');
            if (!item) return;
            var nameEl = item.querySelector('.map-item-name');
            if (!nameEl) return;

            // Check if it's the default folder (未分類) - don't allow rename
            var meta = findMetaById(mapId);
            if (meta && meta.type === 'folder' && meta.isDefault) return;

            // Replace name span with an input element
            var currentName = nameEl.textContent;
            var input = document.createElement('input');
            input.type = 'text';
            input.className = 'map-item-rename-input';
            input.value = currentName;

            nameEl.style.display = 'none';
            nameEl.parentNode.insertBefore(input, nameEl.nextSibling);
            input.focus();
            input.select();

            var finished = false;
            function finish(save) {
                if (finished) return;
                finished = true;
                var defaultName = (meta && meta.type === 'folder') ? '新しいフォルダ' : '無題のマップ';
                var newName = save ? (input.value.trim() || defaultName) : currentName;
                nameEl.style.display = '';
                if (input.parentNode) input.parentNode.removeChild(input);

                if (save) {
                    var metaList = getMetaList();
                    for (var i = 0; i < metaList.length; i++) {
                        if (metaList[i].id === mapId) {
                            metaList[i].name = newName;
                            metaList[i].updatedAt = nowISO();
                            break;
                        }
                    }
                    saveMetaList(metaList);
                    if (mapId === currentMapId) updatePageTitle();
                }
                renderMapList();
            }

            input.addEventListener('keydown', function(e) {
                e.stopPropagation(); // Prevent global keyboard handler
                if (e.key === 'Enter') {
                    e.preventDefault();
                    finish(true);
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    finish(false);
                }
            });
            input.addEventListener('blur', function() {
                finish(true);
            });
        }

        // Expose for testing/integration
        window.getCurrentCopyText = getCurrentCopyText;
        window.getSelectedNodeIds = function() { return selectedNodeIds; };
        window.getMindMapData = function() { return mindMapData; };
        window.getCurrentMapId = function() { return currentMapId; };
        window.getMetaList = getMetaList;
        window.switchToMap = switchToMap;
        window.createNewMap = createNewMap;
        window.createFolder = createFolder;
        window.createPageInFolder = createPageInFolder;
        window.deleteFolder = deleteFolder;
        window.openRightSidebar = openRightSidebar;
        window.closeRightSidebar = closeRightSidebar;
        window.openLeftSidebar = openLeftSidebar;
        window.closeLeftSidebar = closeLeftSidebar;
        window.startInlineRename = startInlineRename;
        window.getSortMode = getSortMode;
        window.setSortMode = setSortMode;
        window.getCollapseState = getCollapseState;
        window.setCollapseState = setCollapseState;
        window.renderMapList = renderMapList;
        window.getDefaultFolderId = getDefaultFolderId;
        window.ensureDefaultFolder = ensureDefaultFolder;

    })();
    </script>
</body>
</html>
