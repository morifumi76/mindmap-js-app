<body>

    <!-- Left Sidebar Hover Zone (for peek when collapsed) -->
    <div class="left-sidebar-hover-zone" id="leftSidebarHoverZone"></div>

    <!-- Floating toggle to re-open left sidebar when collapsed -->
    <button class="left-sidebar-float-toggle" id="leftSidebarFloatToggle" title="マイマップを開く">☰</button>

    <!-- Left Sidebar (My Maps) -->
    <div class="left-sidebar" id="leftSidebar">
        <div class="left-sidebar-content" id="leftSidebarContent">
            <div class="left-sidebar-header">
                <div class="left-sidebar-header-top">
                    <span class="left-sidebar-header-label">マイマップ</span>
                    <div class="left-sidebar-toggle-btn" id="leftSidebarToggle" title="サイドバーを閉じる">«</div>
                </div>
                <div class="left-sidebar-sort-row">
                    <span class="left-sidebar-sort-label">アルファベット順</span>
                    <label class="sort-toggle-switch" id="sortToggle">
                        <input type="checkbox" id="sortToggleInput">
                        <span class="sort-toggle-slider"></span>
                    </label>
                </div>
                <button class="left-sidebar-new-btn" id="newMapBtn">＋ 新規作成</button>
                <div class="left-sidebar-separator"></div>
            </div>
            <div class="left-sidebar-list" id="mapList"></div>
            <div class="left-sidebar-footer" id="leftSidebarFooter" style="display:none">
                <button class="logout-btn" id="logoutBtn">ログアウト</button>
            </div>
        </div>
        <div class="left-sidebar-resize-handle" id="leftSidebarResizeHandle"></div>
    </div>

    <!-- Context Menu for Page Items -->
    <div class="ctx-menu" id="ctxMenu">
        <div class="ctx-menu-item" data-action="rename">✏️ 名前変更</div>
        <div class="ctx-menu-item" data-action="duplicate">📑 複製</div>
        <div class="ctx-menu-item" data-action="share" style="display:none">🔗 共有</div>
        <div class="ctx-menu-item danger" data-action="delete">🗑 削除</div>
    </div>

    <!-- Context Menu for Folder Items -->
    <div class="ctx-menu" id="ctxMenuFolder">
        <div class="ctx-menu-item" data-action="folder-rename">✏️ 名前変更</div>
        <div class="ctx-menu-item" data-action="folder-add-page">📄 ページを追加</div>
        <div class="ctx-menu-item" data-action="folder-add-subfolder">📁 フォルダを追加</div>
        <div class="ctx-menu-item danger" data-action="folder-delete">🗑 削除</div>
    </div>

    <!-- Context Menu for empty area / creating folder -->
    <div class="ctx-menu" id="ctxMenuArea">
        <div class="ctx-menu-item" data-action="create-folder">📁 フォルダを作成</div>
    </div>

    <!-- Canvas Container (Full Screen) -->
    <div class="canvas-container" id="canvasContainer">
        <div class="canvas" id="canvas">
            <div class="canvas-inner" id="canvasInner">
                <svg class="lines-svg" id="linesSvg"></svg>
            </div>
        </div>
    </div>

    <!-- Floating 🌲 toggle for right sidebar (always visible unless sidebar is open) -->
    <button class="sidebar-float-toggle" id="sidebarFloatToggle" title="ツリーナビを開く">🌲</button>

    <!-- Right Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-toggle-btn" id="sidebarToggle" title="サイドバー開閉">◀</div>
        <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
        <button class="sidebar-mini-btn" id="sidebarMiniCopy" title="コピー">📋</button>
        <div class="sidebar-content" id="sidebarContent">
            <div class="sidebar-header">
                <span class="sidebar-header-label">ツリーナビ</span>
                <button class="sidebar-close-btn" id="sidebarCloseBtn" title="閉じる">✕</button>
            </div>
            <div class="sidebar-tree" id="sidebarTree"></div>
            <!-- Bottom panel: toggles + buttons -->
            <div class="sidebar-bottom-panel">
                <div class="sidebar-bottom-separator"></div>
                <div class="sidebar-toggle-area">
                    <div class="sidebar-toggle-row">
                        <span class="sidebar-toggle-label">🐣 ひよこモード</span>
                        <label class="toggle-switch" id="toggleHiyoko">
                            <input type="checkbox" id="toggleHiyokoInput">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="sidebar-toggle-row">
                        <span class="sidebar-toggle-label">罫線</span>
                        <label class="toggle-switch" id="toggleBorder">
                            <input type="checkbox" id="toggleBorderInput" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
                <div class="sidebar-button-area">
                    <button class="sidebar-btn-copy" id="copyBtn" title="クリップボードにコピー">コピー</button>
                </div>
            </div>
            <!-- Hidden selects for backward compatibility -->
            <select id="copyFormat" style="display:none">
                <option value="simple">シンプル</option>
                <option value="hiyoko">ひよこモード</option>
            </select>
            <select id="copyBorder" style="display:none">
                <option value="none">罫線なし</option>
                <option value="border" selected>罫線あり</option>
            </select>
        </div>
    </div>

    <!-- Floating action buttons (top-center of canvas) -->
    <div class="canvas-float-btns" id="canvasFloatBtns">
        <div class="expand-collapse-control" id="expandCollapseControl">
            <button class="expand-collapse-btn" id="collapseAllBtn" title="すべて閉じる">«</button>
            <button class="expand-collapse-btn" id="expandAllBtn" title="すべて開く">»</button>
        </div>
        <div class="zoom-control" id="zoomControl">
            <button class="zoom-btn" id="zoomOutBtn" title="縮小">−</button>
            <span class="zoom-display" id="zoomDisplay">100%</span>
            <button class="zoom-btn" id="zoomInBtn" title="拡大">+</button>
        </div>
        <div class="dot-control">
            <button class="float-action-btn float-dot-btn float-dot-gray" id="grayoutFloatBtn" title="グレーアウト (Option+Cmd+G)"></button>
            <button class="float-action-btn float-dot-btn float-dot-yellow" id="highlightFloatBtn" title="ハイライト (Option+Cmd+Y)"></button>
        </div>
    </div>

    <!-- Lasso Selection Rectangle -->
    <div class="lasso-rect" id="lassoRect"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Save Indicator -->
    <div id="saveIndicator"></div>

    <!-- Read-only banner -->
    <div id="readonlyBanner">閲覧専用モード — このマップは編集できません</div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:#f7f7f5;z-index:9999;align-items:center;justify-content:center;font-family:Meiryo UI,Meiryo,sans-serif;color:#6b6b6b;font-size:14px;">
        データを読み込んでいます...
    </div>
    <style>#loadingOverlay.show{display:flex!important}</style>

    <!-- Login Overlay -->
    <div id="authOverlay">
        <div class="auth-card">
            <h1 class="auth-title">マインドマップ</h1>
            <form id="loginForm">
                <div class="auth-field">
                    <label for="loginEmail">メールアドレス</label>
                    <input type="email" id="loginEmail" autocomplete="username" required>
                </div>
                <div class="auth-field">
                    <label for="loginPassword">パスワード</label>
                    <input type="password" id="loginPassword" autocomplete="current-password" required>
                </div>
                <div class="auth-error" id="loginError"></div>
                <button type="submit" class="auth-btn" id="loginBtn">ログイン</button>
            </form>
        </div>
    </div>

    <!-- Migration Dialog -->
    <div id="migrationOverlay">
        <div class="migration-card">
            <h2 class="migration-title">📦 データの移行</h2>
            <div class="migration-body">
                ブラウザに保存されているマインドマップデータが見つかりました。クラウドに移行しますか？
                <div class="migration-count" id="migrationCount"></div>
            </div>
            <div class="migration-btns">
                <button class="migration-btn-secondary" id="migrationBtnLater">あとで</button>
                <button class="migration-btn-primary" id="migrationBtnDo">移行する</button>
            </div>
        </div>
    </div>

    <!-- Share Dialog -->
    <div id="shareOverlay">
        <div class="share-card">
            <div class="share-card-header">
                <h2 class="share-card-title">🔗 共有</h2>
                <button class="share-card-close" id="shareCloseBtn">✕</button>
            </div>
            <div class="share-toggle-row">
                <span class="share-toggle-label">このマップを共有する</span>
                <label class="share-toggle-switch">
                    <input type="checkbox" id="shareToggleInput">
                    <span class="share-toggle-slider"></span>
                </label>
            </div>
            <div class="share-url-box" id="shareUrlBox">
                <input type="text" class="share-url-input" id="shareUrlInput" readonly>
                <button class="share-copy-btn" id="shareUrlCopyBtn">URLをコピー</button>
            </div>
        </div>
    </div>

    <!-- BUILD:js -->
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/history.js"></script>
    <script src="js/nodes.js"></script>
    <script src="js/selection.js"></script>
    <script src="js/editing.js"></script>
    <script src="js/clipboard.js"></script>
    <script src="js/drag.js"></script>
    <script src="js/lasso.js"></script>
    <script src="js/render.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/canvas-interaction.js"></script>
    <script src="js/init.js"></script>
    <script src="js/sidebar-right.js"></script>
    <script src="js/sidebar-left.js"></script>
    <!-- /BUILD:js -->
</body>
</html>
